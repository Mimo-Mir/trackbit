name: Supabase Keepalive

on:
  schedule:
    # Every 4 days at 04:23 UTC.
    - cron: '23 4 */4 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping trackbit keepalive table via PostgREST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing required secrets. Set either SUPABASE_URL/SUPABASE_ANON_KEY or NEXT_PUBLIC_SUPABASE_URL/NEXT_PUBLIC_SUPABASE_ANON_KEY in GitHub repository secrets."
            exit 1
          fi

          endpoint="${SUPABASE_URL}/rest/v1/keepalive_ping?select=id&limit=1"

          response=$(curl --silent --show-error --location --retry 2 --retry-delay 2 \
            --write-out "\n%{http_code}" \
            --header "apikey: ${SUPABASE_ANON_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --header "Accept-Profile: trackbit" \
            "$endpoint")

          status=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')

          if [ "$status" != "200" ]; then
            echo "Keepalive ping failed with HTTP $status"
            echo "$body"
            exit 1
          fi

          echo "Supabase keepalive ping successful"
